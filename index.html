<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bar Deals Pro</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<style>
body{margin:0;background:#121212;color:#fff;font-family:Arial}#app{display:none}#map{height:80vh}.top{padding:10px;display:flex;gap:8px;flex-wrap:wrap}.btn{padding:10px 14px;border:0;border-radius:10px;background:#00c853;color:#fff;font-weight:700}.card{padding:16px;max-width:420px;margin:40px auto;background:#1e1e1e;border-radius:16px;text-align:center}
</style>
</head>
<body>
<div id="login" class="card"><h2>Login Required</h2><p>Please sign in to continue.</p><button class="btn" onclick="signInWithGoogle()">Login with Google</button></div>
<div id="app"><div class="top"><button class="btn" onclick="toggleToday()">All Bars</button><span id="user"></span></div><div id="map"></div></div>
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
import { getFirestore, doc, setDoc, getDoc, collection, addDoc } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
const firebaseConfig={apiKey:'YOUR_KEY',authDomain:'YOUR_DOMAIN',projectId:'YOUR_ID',appId:'YOUR_APP'};
const fb=initializeApp(firebaseConfig),auth=getAuth(fb),db=getFirestore(fb),provider=new GoogleAuthProvider();
let map,user,currentUser,userLat=43.8138,userLng=-91.2519,apiBars=[],showTodayOnly=false,favorites={};
window.signInWithGoogle=()=>signInWithPopup(auth,provider);
window.toggleToday=()=>{showTodayOnly=!showTodayOnly;render();};
onAuthStateChanged(auth, async u=>{if(!u){login.style.display='block';app.style.display='none';return;} currentUser=u;login.style.display='none';app.style.display='block';user.textContent=u.displayName; await boot();});
async function boot(){initMap(); await loadFavorites(); instantLoad(); locate();}
function initMap(){if(map)return; map=L.map('map').setView([userLat,userLng],13);L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);} 
function instantLoad(){const c=localStorage.getItem('bars_cache'); if(c){apiBars=JSON.parse(c);render();}}
function locate(){navigator.geolocation.getCurrentPosition(async p=>{userLat=p.coords.latitude;userLng=p.coords.longitude;map.setView([userLat,userLng],14);await refreshFromAPI();}, refreshFromAPI,{timeout:4000});}
async function refreshFromAPI(){const q=`[out:json];node["amenity"~"bar|pub|nightclub"](around:3000,${userLat},${userLng});out;`; const r=await fetch('https://overpass-api.de/api/interpreter',{method:'POST',body:q}); const d=await r.json(); apiBars=d.elements||apiBars; localStorage.setItem('bars_cache',JSON.stringify(apiBars)); render();}
function render(){ if(!map)return; document.querySelector('.btn').textContent=showTodayOnly?'Today Only':'All Bars'; if(window.layer){window.layer.clearLayers();} window.layer=L.layerGroup().addTo(map); apiBars.forEach(b=>{const name=b.tags?.name||'Bar'; const m=L.marker([b.lat,b.lon]).addTo(window.layer); const fav=favorites[name]?'★':'☆'; m.bindPopup(`<b>${name}</b><br><button onclick="fav('${name.replace(/'/g,'')}')">${fav} Favorite</button>`); m.on('click',()=>trackClick(name));});}
window.fav=async(name)=>{favorites[name]=!favorites[name]; await setDoc(doc(db,'users',currentUser.uid,'favorites',name),{name,active:favorites[name]}); render();}
async function loadFavorites(){favorites={};}
async function trackClick(name){await addDoc(collection(db,'analytics_clicks'),{uid:currentUser.uid,name,ts:Date.now()});}
</script>
</body></html>
