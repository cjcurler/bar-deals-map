<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bar Deals Real Final</title>

  <!-- Libraries -->

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

  <style>
    body {
      margin: 0;
      background: #121212;
      color: white;
      font-family: Arial, sans-serif;
    }
    .toolbar {
      display: flex;
      gap: 10px;
      padding: 10px;
      padding-right: 260px;
      flex-wrap: wrap;
    }
    .btn {
      padding: 10px 14px;
      border: 0;
      border-radius: 10px;
      background: #00c853;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
    .secondary { background: #555; }
    #map { height: 82vh; }
    .login {
      position: absolute;
      top: 15px;
      right: 15px;
      z-index: 9999;
      background: #1e1e1e;
      padding: 14px;
      border-radius: 14px;
      width: 220px;
    }
  </style>

</head>
<body>
  <div class="login">
    <button class="btn" onclick="signInWithGoogle()">Login</button>
    <button class="btn secondary" onclick="logout()">Logout</button>
    <div id="userInfo">Checking login...</div>
  </div>

  <div class="toolbar">
    <button class="btn" id="filterBtn" onclick="toggleFilter()">Filter: OFF</button>
    <button class="btn secondary" onclick="showFavorites()">Favorite Bars</button>
  </div>

  <div id="map"></div>

  <script>
    let map, cluster;
    let userLat = 43.8138;
    let userLng = -91.2519;
    let apiBars = [];
    let bars = [];
    let favorites = {};
    let showDeals = false;
    let currentUser = null;

    function initMap() {
      map = L.map('map').setView([userLat, userLng], 13);

      L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

      cluster = L.markerClusterGroup({
        iconCreateFunction(group) {
          const active = group.getAllChildMarkers().some(m => m.options.hasDeal);
          const color = active ? '#00c853' : '#777';

          return L.divIcon({
            html: `<div style="background:${color};width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:bold">${group.getChildCount()}</div>`,
            className: '',
            iconSize: [40, 40]
          });
        }
      });

      map.addLayer(cluster);
    }

    function toggleFilter() {
      showDeals = !showDeals;
      document.getElementById('filterBtn').innerText = showDeals ? 'Filter: ON' : 'Filter: OFF';
      render();
    }

    function todayName() {
      return new Date().toLocaleString('en-US', { weekday: 'long' });
    }

    function dealNow(match) {
      if (!match) return false;
      const h = new Date().getHours();
      return match.deals.some(x => x.day === todayName() && h >= x.start && h < x.end);
    }

    function dealToday(match) {
      if (!match) return false;
      return match.deals.some(x => x.day === todayName());
    }

    async function loadDeals() {
      const url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRW0U7ggb9jz62hIyDEiTXqi6bzQ3NgZ_sEEdN7KfGsMLiwTaeYOHSK3e61bwbe2_GG_BStDFW2KNOQ/pub?output=csv';
      const res = await fetch(url);
      const text = await res.text();
      const rows = text.split('\n').slice(1);
      const data = {};

      rows.forEach(row => {
        const c = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
        const name = (c[1] || '').replace(/"/g, '').trim();
        if (!name) return;

        if (!data[name]) data[name] = { name, deals: [] };
        data[name].deals.push({
          day: (c[2] || '').trim(),
          start: parseFloat(c[3]),
          end: parseFloat(c[4]),
          deal: (c[5] || '').trim()
        });
      });

      bars = Object.values(data);
    }
  </script>

</body>
</html>
