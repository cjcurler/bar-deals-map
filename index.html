<!DOCTYPE html>
<html>
<head>
    <title>Bar Deals Map</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <!-- Marker Cluster -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css" />
    <script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

    <style>
        body { font-family: Arial; background:#121212; color:white; text-align:center; }
        #map { height:75vh; border-radius:12px; }
        button { padding:10px 16px; margin:10px; border:none; border-radius:8px; background:#00c853; color:white; font-weight:bold;}
    </style>
</head>

<body>

<h2>🍺 Bar Deals Near You</h2>
<button onclick="toggleToday()">Filter: OFF (All Bars)</button>

<div id="map"></div>

<script>

// ---------------- MAP ----------------
var map = L.map('map', { maxZoom:20 }).setView([43.8138, -91.2519], 13);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap & CartoDB',
    maxZoom:20
}).addTo(map);

// ---------------- STATE ----------------
var showTodayOnly = false;
var userLat, userLng;
var apiBars = [];
var bars = []; // 🔥 FROM GOOGLE SHEET

// ---------------- CLUSTER ----------------
var markerCluster = L.markerClusterGroup({
    maxClusterRadius:80,
    disableClusteringAtZoom:17,
    iconCreateFunction: function(cluster){
        var hasDeal = cluster.getAllChildMarkers().some(m=>m.options.hasDeal);
        var color = hasDeal ? "#00c853" : "#888";

        return L.divIcon({
            html:`<div style="background:${color};width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-weight:bold;">${cluster.getChildCount()}</div>`,
            iconSize:[40,40]
        });
    }
});
map.addLayer(markerCluster);

// ---------------- TOGGLE ----------------
function toggleToday(){
    showTodayOnly = !showTodayOnly;
    document.querySelector("button").innerText =
        showTodayOnly ? "Filter: ON (Today's Deals)" : "Filter: OFF (All Bars)";
    refreshMarkers();
}

// ---------------- HELPERS ----------------
function normalize(str){
    return str.toLowerCase().replace(/[^a-z0-9]/g,"");
}

function formatHour(h){
    let suffix = h>=12?"PM":"AM";
    let hour = h%12||12;
    return hour + ":00 " + suffix;
}

function getTodayDeals(bar){
    let today = new Date().toLocaleString('en-US',{weekday:'long'});
    return bar.deals.filter(d=>d.day===today);
}

function getCurrentDeals(bar){
    let now = new Date();
    let today = now.toLocaleString('en-US',{weekday:'long'});
    let hour = now.getHours();

    return bar.deals.filter(d=>d.day===today && hour>=d.start && hour<d.end);
}

// ---------------- GOOGLE SHEET LOADER ----------------
async function loadDealsFromSheet(){

    // 🔥 🔥 🔥 PASTE YOUR CSV LINK HERE 🔥 🔥 🔥
    var url = "PASTE_YOUR_GOOGLE_SHEET_CSV_LINK_HERE";

    var res = await fetch(url);
    var text = await res.text();

    var rows = text.split("\n").slice(1);

    var mapData = {};

    rows.forEach(row=>{
        var cols = row.split(",");

        var name = cols[0];
        var day = cols[1];
        var start = parseFloat(cols[2]);
        var end = parseFloat(cols[3]);
        var deal = cols[4];

        if(!mapData[name]){
            mapData[name] = { name:name, deals:[] };
        }

        mapData[name].deals.push({day,start,end,deal});
    });

    bars = Object.values(mapData);

    console.log("Loaded bars:", bars);

    refreshMarkers();
}

// ---------------- RENDER ----------------
function createMarker(lat,lng,popup,hasDeal){
    var icon = L.icon({
        iconUrl:`https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-${hasDeal?'green':'grey'}.png`,
        shadowUrl:'https://unpkg.com/leaflet/dist/images/marker-shadow.png',
        iconSize:[25,41],
        iconAnchor:[12,41]
    });

    return L.marker([lat,lng],{icon,hasDeal}).bindPopup(popup);
}

function refreshMarkers(){
    markerCluster.clearLayers();

    // user marker
    if(userLat){
        markerCluster.addLayer(
            L.marker([userLat,userLng]).bindPopup("📍 You are here")
        );
    }

    // API bars
    apiBars.forEach(place=>{
        var name = place.tags?.name || "Unnamed Bar";

        var match = bars.find(b =>
            normalize(name).includes(normalize(b.name))
        );

        var todayDeals = match ? getTodayDeals(match) : [];
        var currentDeals = match ? getCurrentDeals(match) : [];

        if(showTodayOnly && todayDeals.length===0) return;

        var popup = `<b>${name}</b><br>`;

        if(currentDeals.length>0){
            currentDeals.forEach(d=>popup+=`🔥 ${d.deal}<br>`);
        }
        else if(todayDeals.length>0){
            popup+="📅 Today:<br>";
            todayDeals.forEach(d=>{
                popup+=`${formatHour(d.start)} - ${d.deal}<br>`;
            });
        }
        else{
            popup+="No deal data";
        }

        markerCluster.addLayer(
            createMarker(place.lat, place.lon, popup, currentDeals.length>0)
        );
    });
}

// ---------------- OSM API ----------------
async function loadBarsFromOSM(lat,lng){
    var query = `
        [out:json];
        node["amenity"~"bar|pub|nightclub"](around:3000, ${lat}, ${lng});
        out;
    `;

    var res = await fetch("https://overpass-api.de/api/interpreter", {
        method:"POST",
        body:query
    });

    var data = await res.json();

    apiBars = data.elements;

    refreshMarkers();
}

// ---------------- LOCATION ----------------
map.locate({setView:true,maxZoom:14});

map.on('locationfound', function(e){
    userLat = e.latlng.lat;
    userLng = e.latlng.lng;

    loadBarsFromOSM(userLat,userLng);
});

// ---------------- START ----------------
loadDealsFromSheet();

</script>

</body>
</html>
